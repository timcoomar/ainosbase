name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: 195.201.216.32
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/ainosbase.gr

            # Commit any pending content changes before pulling to avoid conflicts
            if [[ -n $(git status --porcelain content/ users/) ]]; then
              git add content/ users/
              git commit -m "Auto-sync content before deploy [$(date '+%Y-%m-%d %H:%M')]"
              git pull --rebase origin main
              git push origin main
            fi

            # Discard any other local changes (e.g. package-lock.json) that would block the pull
            git checkout -- .

            git pull origin main
            composer install --no-dev --optimize-autoloader
            npm ci && npm run build
            php artisan cache:clear
            php artisan statamic:stache:clear
